<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人邮局 Pro</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/landing.css" />
  <link rel="stylesheet" href="styles/login.css" />
</head>

<body class="landing-page">

  <!-- Global Nav -->
  <nav class="global-nav">
    <div class="nav-content">
      <div class="nav-logo" onclick="window.scrollTo(0, 0)">✉️ 个人邮局</div>
      <div class="nav-links">
      </div>
      <button class="btn-login-nav" id="navLoginBtn">登录</button>
    </div>
  </nav>

  <div class="ambient-glow"></div>

  <!-- Hero Section -->
  <section class="hero-section" id="overview">
    <h1 class="hero-title">个人邮局 <span class="pro-text">Pro</span></h1>
    <h2 class="hero-subtitle">超前，超凡，超酷。</h2>
    <p class="hero-price">永久免费。重新定义属于你的邮件体验。</p>

    <div class="hero-actions">
      <button class="btn-buy" id="heroLoginBtn">立即开启</button>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    © 2026 个人邮局 保留所有权.
  </footer>

  <!-- Login Modal overlay -->
  <div class="login-modal-overlay" id="loginModal">
    <button class="close-btn" id="closeModal">×</button>

    <div class="login-card" style="margin: 0;">
      <div class="login-header">
        <span class="logo-icon">✉️</span>
        <h2>登入个人邮局</h2>
      </div>

      <div class="login-error" id="loginError">邮箱或密码错误，请重试。</div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <div class="input-wrap">
            <input class="input" type="email" id="email" name="email" placeholder="Apple ID 或邮箱" required
              autocomplete="email" />
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 32px;">
          <div class="input-wrap password-wrap">
            <input class="input" type="password" id="password" name="password" placeholder="密码" required
              autocomplete="current-password" />
            <span class="toggle-pw" id="togglePw" title="显示/隐藏密码">👁</span>
          </div>
        </div>

        <button type="submit" class="btn-login">
          继续
        </button>

        <div class="login-demo-hint">
          <label class="checkbox-label" style="display:flex; justify-content:center; gap:8px; margin-bottom:12px;">
            <input type="checkbox" id="remember" name="remember" /> 保持登录状态
          </label>
          <a href="#" class="forgot-link">忘记密码？</a><br><br>
          演示账号：demo@apple.com / 123456
        </div>
      </form>
    </div>
  </div>

  <script>
    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          window.scrollTo({
            top: target.offsetTop - 60,
            behavior: 'smooth'
          });
        }
      });
    });

    // 模态框逻辑
    const modal = document.getElementById('loginModal');
    const openBtns = [document.getElementById('navLoginBtn'), document.getElementById('heroLoginBtn')];
    const closeBtn = document.getElementById('closeModal');

    openBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modal.classList.add('active');
        // 当打开模态框时，禁止背景滚动
        document.body.style.overflow = 'hidden';
      });
    });

    closeBtn.addEventListener('click', () => {
      modal.classList.remove('active');
      document.body.style.overflow = '';
    });

    // 表单登录逻辑
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');
    const togglePw = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');

    togglePw.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      togglePw.textContent = isText ? '👁' : '🙈';
    });

    const savedEmail = localStorage.getItem('ppo_email');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
      document.getElementById('remember').checked = true;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (!email || !password) {
        errEl.classList.add('show');
        return;
      }

      errEl.classList.remove('show');

      if (remember) {
        localStorage.setItem('ppo_email', email);
      } else {
        localStorage.removeItem('ppo_email');
      }

      const userName = email.split('@')[0];
      localStorage.setItem('ppo_user', JSON.stringify({
        email,
        name: userName.charAt(0).toUpperCase() + userName.slice(1),
        avatar: userName.charAt(0).toUpperCase(),
        loggedIn: true
      }));

      // 跳转到内部系统 (App.html)
      window.location.href = 'app.html';
    });
  </script>
</body>

</html>
